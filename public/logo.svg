<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#34d399"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Dark background circle -->
  <circle cx="128" cy="128" r="120" fill="#0a0a0a" stroke="url(#g)" stroke-width="3"/>
  <!-- Play button triangle -->
  <polygon points="100,72 100,184 188,128" fill="url(#g)" opacity="0.9" filter="url(#glow)"/>
  <!-- Sparkle/eraser effect - three small diamonds -->
  <g fill="#34d399" opacity="0.8">
    <polygon points="180,60 186,72 180,84 174,72" transform="rotate(15,180,72)"/>
    <polygon points="200,80 204,88 200,96 196,88" transform="rotate(-10,200,88)"/>
    <polygon points="190,45 193,51 190,57 187,51"/>
  </g>
  <!-- Strikethrough line over watermark concept -->
  <line x1="60" y1="200" x2="196" y2="200" stroke="url(#g)" stroke-width="3" stroke-linecap="round" opacity="0.5"/>
  <line x1="60" y1="200" x2="140" y2="200" stroke="#34d399" stroke-width="3" stroke-linecap="round"/>
</svg>
